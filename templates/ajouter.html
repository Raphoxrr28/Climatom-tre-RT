<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un Étudiant - Climatomètre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border-radius: 15px; border: none; }
        .card-header { background: linear-gradient(135deg, #007bff, #0056b3); border-radius: 15px 15px 0 0 !important; }
        .section-divider { 
            font-size: 0.85rem; font-weight: bold; color: #6c757d; 
            text-transform: uppercase; border-bottom: 1px solid #dee2e6; 
            margin: 25px 0 15px 0; padding-bottom: 5px;
        }
    </style>
</head>
<body class="py-5">

<div class="container" style="max-width: 700px;">
    <div class="card shadow-lg">
        <div class="card-header text-white text-center py-4">
            <h2 class="mb-0">Inscription Étudiant</h2>
            <p class="mb-0 opacity-75">Système Climatomètre</p>
        </div>
        <div class="card-body p-4 p-md-5">
            
            <form method="POST" action="/ajouter">
                
                <div class="section-divider">Identité</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nom</label>
                        <input type="text" name="nom" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Prénom</label>
                        <input type="text" name="prenom" class="form-control" required>
                    </div>
                </div>

                <div class="section-divider text-primary">📍 Résidence Principale</div>
                <div class="mb-3">
                    <label class="form-label">Ville</label>
                    <input type="text" name="ville_p" class="form-control" placeholder="ex: Montbéliard" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Adresse précise</label>
                    <input type="text" name="adresse_p" class="form-control" placeholder="ex: 4 Place Tharradin">
                </div>

                <div class="section-divider text-secondary">🏠 Résidence Secondaire (Facultatif)</div>
                <div class="mb-3">
                    <label class="form-label">Ville</label>
                    <input type="text" name="ville_s" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Adresse précise</label>
                    <input type="text" name="adresse_s" class="form-control">
                </div>

                <div class="mt-5 d-flex justify-content-between align-items-center">
                    <a href="/" class="text-muted">← Dashboard</a>
                    <button type="submit" class="btn btn-primary btn-lg px-5">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
