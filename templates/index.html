<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climatomètre R&T</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/leaflet.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/MarkerCluster.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/MarkerCluster.Default.css') }}" />
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #2e2e2e, #1f1f1f);
            --card-bg: rgba(40, 40, 40, 0.75);
            --text-main: #e8f5ee;
            --text-label: #b7d4c7;
            --text-placeholder: #9fb5aa;
            --input-bg: rgba(126, 214, 165, 0.08);
            --border-color: rgba(255,255,255,0.08);
            --accent: #4caf7d;
            --accent-light: #7ed6a5;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            background-attachment: fixed;
        }

        .conteneur {
            max-width: 1180px;
            margin: 30px auto;
            padding: 0 20px 40px;
        }

        .carte {
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
            overflow: hidden;
        }

        .entete-carte {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: #0f1f17;
            padding: 30px 30px;
        }

        .entete-carte h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.02em;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            padding: 22px 30px 10px;
        }

        .toolbar .search-box {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        .toolbar input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 0.98rem;
        }

        .toolbar input::placeholder {
            color: var(--text-placeholder);
        }

        .toolbar button,
        .toolbar a.button {
            border: none;
            border-radius: 14px;
            padding: 14px 22px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: #0f1f17;
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar button:hover,
        .toolbar a.button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.2);
        }

        .section {
            padding: 28px 30px 30px;
        }

        #map {
            width: 100%;
            height: 620px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 24px;
        }

        .alert-info {
            background: rgba(126, 214, 165, 0.12);
            border-color: rgba(126, 214, 165, 0.22);
            color: #dff5e0;
            border-radius: 16px;
            padding: 18px 22px;
            margin-bottom: 28px;
        }

        .city-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 22px;
        }

        .city-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 22px;
        }

        .city-card h2 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.25rem;
        }

        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            margin-bottom: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            transition: background 0.2s ease;
        }

        .student-item span {
            color: #e8f5ee;
            font-size: 0.95rem;
        }

        .student-item:hover {
            background: rgba(126, 214, 165, 0.08);
        }

        .student-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .student-item a {
            border-radius: 12px;
            padding: 8px 12px;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease;
        }

        .student-item a.delete {
            background: #ff5f6d;
        }

        .student-item a.edit {
            background: #3b82f6;
        }

        .student-item a:hover {
            transform: translateY(-1px);
        }

        @media (max-width: 980px) {
            .city-grid {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar .search-box {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="conteneur">
        <div class="carte">
            <div class="entete-carte">
                <h1>Carte de la Promotion</h1>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <form id="searchForm" style="width:100%; display:flex; gap:10px;" onsubmit="return false;">
                        <input type="text" id="searchInput" placeholder="Chercher par ville, adresse ou étudiant...">
                        <button type="submit">Rechercher</button>
                    </form>
                </div>
                <a href="/ajouter" class="button">+ Ajouter un étudiant</a>
            </div>

            <div class="section">
                <div id="map"></div>
                <div class="alert-info">Température Médiane : {{ mediane }}°C</div>
                <h2>Liste des Étudiants par Ville</h2>
                <div class="city-grid">
                    {% for city in grouped_cities %}
                    <div class="city-card" data-city="{{ city.ville }}">
                        <h2>{{ city.ville }}</h2>
                        <div>
                            {% for student_key, student_data in city.students.items() | sort %}
                            <div class="student-item" data-student="{{ student_key }}" data-address="{{ student_data.adresse }}">
                                <span>{{ student_data.info | safe }}</span>
                                <div class="student-actions">
                                    <a href="/modifier/{{ student_data.et_id }}" class="edit">✎</a>
                                    <a href="/supprimer/{{ student_data.et_id }}" class="delete" onclick="return confirm('Confirmer la suppression ?');">✕</a>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/leaflet.js') }}"></script>
    <script src="{{ url_for('static', filename='js/leaflet.markercluster.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            function applySearch() {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const cards = document.querySelectorAll('.city-card');

                cards.forEach(card => {
                    const city = card.getAttribute('data-city').toLowerCase();
                    const studentEls = card.querySelectorAll('[data-student]');
                    let cardMatch = false;

                    studentEls.forEach(el => {
                        const studentName = el.getAttribute('data-student').toLowerCase();
                        const address = el.getAttribute('data-address').toLowerCase();
                        const matches = city.includes(searchTerm) || studentName.includes(searchTerm) || address.includes(searchTerm);
                        el.style.display = matches ? 'flex' : 'none';
                        if (matches) cardMatch = true;
                    });

                    card.style.display = cardMatch ? 'block' : 'none';
                });
            }

            document.getElementById('searchInput').addEventListener('input', applySearch);
            document.getElementById('searchForm').addEventListener('submit', function(event) {
                event.preventDefault();
                applySearch();
            });

            if (typeof L === 'undefined') {
                console.warn('Leaflet n\'est pas chargé, la carte ne peut pas s\'afficher.');
                return;
            }

            try {
                var map = L.map('map').setView([47.50, 6.80], 9);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                var locations = {{ points | tojson }};
                var coordGroups = {};
                locations.forEach(function(loc) {
                    var key = loc.lat + ',' + loc.lon;
                    coordGroups[key] = coordGroups[key] || [];
                    coordGroups[key].push(loc);
                });

                Object.values(coordGroups).forEach(function(group) {
                    if (group.length <= 1) return;
                    var radius = 0.00008;
                    group.forEach(function(loc, idx) {
                        var angle = (2 * Math.PI * idx) / group.length;
                        loc._lat = loc.lat + radius * Math.cos(angle);
                        loc._lon = loc.lon + radius * Math.sin(angle);
                    });
                });

                var markerClusterGroup = L.markerClusterGroup({
                    maxClusterRadius: 40,
                    disableClusteringAtZoom: 17,
                    spiderfyOnMaxZoom: true,
                    showCoverageOnHover: false,
                    zoomToBoundsOnClick: true
                });
                var markers = [];

                locations.forEach(function(loc) {
                    var lat = loc._lat || loc.lat;
                    var lon = loc._lon || loc.lon;
                    var marker = L.marker([lat, lon]);
                    marker.bindPopup(loc.popup);
                    marker.searchText = loc.search;
                    markers.push(marker);
                    markerClusterGroup.addLayer(marker);
                });

                map.addLayer(markerClusterGroup);

                function filterMarkers() {
                    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                    markerClusterGroup.clearLayers();

                    markers.forEach(function(marker) {
                        const matches = !searchTerm || marker.searchText.includes(searchTerm);
                        if (matches) {
                            markerClusterGroup.addLayer(marker);
                        }
                    });

                    const visibleLayers = markerClusterGroup.getLayers();
                    if (visibleLayers.length > 0) {
                        map.fitBounds(markerClusterGroup.getBounds(), {
                            padding: [40, 40],
                            maxZoom: 16
                        });
                    } else {
                        map.setView([47.50, 6.80], 9);
                    }
                }

                document.getElementById('searchInput').addEventListener('input', filterMarkers);
                document.getElementById('searchForm').addEventListener('submit', function(event) {
                    event.preventDefault();
                    filterMarkers();
                });
            } catch (error) {
                console.error('Erreur carte:', error);
            }
        });
    </script>
</body>
</html>
